<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I love you</title>
<link rel="stylesheet" href="music-player.css">
<style>
  @font-face{
    font-family:'Minecraft Seven';
    src: url('fonts/Minecraft-Seven_v2.woff2') format('woff2');
    font-weight:normal;
    font-style:normal;
    font-display:swap;
  }

  :root{
    --black:#0a0a0a;
    --white:#ffffff;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }

  html, body{
    height:100%;
  }

  body{
    min-height:100vh;
    background:
      linear-gradient(rgba(10,8,6,.45), rgba(10,8,6,.45)),
      url('backgrounds/iloveyou-bg.webp');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    color:var(--white);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px;
    text-align:center;
  }

  .iloveyou-content{
    max-width:640px;
  }

  .iloveyou-quote{
    font-family:'Minecraft Seven', 'Helvetica Neue', Arial, sans-serif;
    font-size:1.4rem;
    line-height:1.7;
    text-shadow:0 2px 0 rgba(0,0,0,.6), 0 0 18px rgba(0,0,0,.4);
    margin-bottom:28px;
  }

  .iloveyou-line{
    font-family:'Minecraft Seven', 'Helvetica Neue', Arial, sans-serif;
    font-size:2.4rem;
    text-shadow:0 3px 0 rgba(0,0,0,.6), 0 0 22px rgba(0,0,0,.45);
  }

  @media (max-width:480px){
    .iloveyou-quote{ font-size:1.05rem; }
    .iloveyou-line{ font-size:1.8rem; }
  }

  /* Endless slow auto-scroll through fonts/blank.txt, styled like a
     letter/poem block. The track holds two back-to-back copies of the
     text; JS moves it upward via requestAnimationFrame and wraps the
     offset (using modulo against one copy's height) once the first
     copy has fully scrolled past, so the loop never visibly jumps or
     shows a blank gap. */
  .iloveyou-scroll-viewport{
    margin-top:36px;
    max-width:560px;
    max-height:38vh;
    overflow:hidden;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, black 12%, black 88%, transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 0, black 12%, black 88%, transparent 100%);
  }
  .iloveyou-scroll-track{
    will-change:transform;
  }
  .iloveyou-scroll-copy{
    font-family:'Minecraft Seven', 'Helvetica Neue', Arial, sans-serif;
    font-size:1.05rem;
    line-height:1.9;
    white-space:pre-wrap;
    text-shadow:0 2px 0 rgba(0,0,0,.6), 0 0 14px rgba(0,0,0,.4);
    opacity:.85;
    padding-bottom:2.4em; /* gap between the looped copies */
  }

  @media (max-width:480px){
    .iloveyou-scroll-viewport{ max-height:32vh; }
    .iloveyou-scroll-copy{ font-size:.92rem; }
  }
  .back-home{
    position:fixed;
    top:calc(env(safe-area-inset-top, 0px) + 14px);
    left:calc(env(safe-area-inset-left, 0px) + 14px);
    z-index:50;
    color:var(--white);
    text-decoration:none;
    font-size:.85rem;
    font-weight:600;
    background:rgba(10,10,10,.55);
    border:1.5px solid var(--white);
    border-radius:999px;
    padding:8px 14px;
    transition:background .15s ease;
  }
  .back-home:hover{ background:rgba(170,70,173,.55); }
</style>
</head>
<body>

  <a class="back-home" href="index.html">&larr; Back</a>

  <audio id="bg-music" loop preload="auto"></audio>
  <div class="music-control toggle-only">
    <div class="music-row">
      <div class="music-meta">
        <img id="music-art" class="music-art" src="" alt="" hidden>
        <div id="music-art-fallback" class="music-art-fallback">♪</div>
        <div class="music-text">
          <span class="music-now-playing">Now Playing</span>
          <span id="music-title" class="music-title">warmth</span>
        </div>
      </div>
      <button id="music-toggle" class="music-toggle" aria-label="Pause music" aria-pressed="true">
        <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
    </div>
    <div class="music-volume-wrap">
      <div id="music-volume" class="music-volume" role="slider" tabindex="0"
           aria-label="Music volume" aria-orientation="vertical" aria-valuenow="25">
        <div class="music-volume-track"></div>
        <div id="music-volume-fill" class="music-volume-fill"></div>
        <div id="music-volume-thumb" class="music-volume-thumb"></div>
      </div>
    </div>
  </div>

  <main class="iloveyou-content">
    <p class="iloveyou-quote">"And the universe said I love you because you are love"</p>
    <p class="iloveyou-line">I love you.</p>

    <div class="iloveyou-scroll-viewport" id="iloveyou-scroll-viewport">
      <div class="iloveyou-scroll-track" id="iloveyou-scroll-track">
        <div class="iloveyou-scroll-copy" id="iloveyou-scroll-copy-a"></div>
        <div class="iloveyou-scroll-copy" id="iloveyou-scroll-copy-b" aria-hidden="true"></div>
      </div>
    </div>
  </main>

<script src="music-player.js"></script>
<script>
  // Endless slow auto-scroll through fonts/blank.txt. Two identical
  // copies of the text sit stacked in the track; each frame we move
  // the track up by a small, framerate-independent amount and take
  // the result modulo one copy's height, so once the first copy has
  // scrolled fully out of view the offset silently wraps back to the
  // equivalent position in the second copy — same visual spot, so
  // there's no jump or gap, and it can run forever without ever
  // resetting to a jarring blank state.
  document.addEventListener('DOMContentLoaded', () => {
    const viewport = document.getElementById('iloveyou-scroll-viewport');
    const track = document.getElementById('iloveyou-scroll-track');
    const copyA = document.getElementById('iloveyou-scroll-copy-a');
    const copyB = document.getElementById('iloveyou-scroll-copy-b');
    if (!viewport || !track || !copyA || !copyB) return;

    const SPEED_PX_PER_SEC = 18; // slow, readable scroll
    const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    fetch('fonts/blank.txt', { cache: 'no-store' })
      .then((res) => {
        if (!res.ok) throw new Error('blank.txt not found');
        return res.text();
      })
      .then((text) => {
        const content = text.trim();
        if (!content) return;
        copyA.textContent = content;
        copyB.textContent = content;
        startScrolling();
      })
      .catch((err) => {
        console.log('Could not load fonts/blank.txt:', err);
        viewport.hidden = true;
      });

    function startScrolling() {
      if (reduceMotion) return; // respect the OS-level preference; text stays static and readable

      let offset = 0;
      let lastTime = null;
      let copyHeight = copyA.getBoundingClientRect().height;

      window.addEventListener('resize', () => {
        copyHeight = copyA.getBoundingClientRect().height;
      });

      function frame(timestamp) {
        if (lastTime === null) lastTime = timestamp;
        const deltaSeconds = (timestamp - lastTime) / 1000;
        lastTime = timestamp;

        if (copyHeight > 0 && document.visibilityState === 'visible') {
          offset = (offset + SPEED_PX_PER_SEC * deltaSeconds) % copyHeight;
          track.style.transform = `translateY(${-offset}px)`;
        }

        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    }
  });
</script>
</body>
</html>
