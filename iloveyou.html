<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I love you</title>
<link rel="stylesheet" href="music-player.css">
<style>
  @font-face{
    font-family:'Minecraft Seven';
    src: url('fonts/Minecraft-Seven_v2.woff2') format('woff2');
    font-weight:normal;
    font-style:normal;
    font-display:swap;
  }

  :root{
    --black:#0a0a0a;
    --white:#ffffff;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }

  html, body{
    height:100%;
  }

  body{
    min-height:100vh;
    background:
      linear-gradient(rgba(10,8,6,.45), rgba(10,8,6,.45)),
      url('backgrounds/iloveyou-bg.webp');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    color:var(--white);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px;
    text-align:center;
  }

  .iloveyou-content{
    max-width:640px;
  }

  .iloveyou-quote{
    font-family:'Minecraft Seven', 'Helvetica Neue', Arial, sans-serif;
    font-size:1.4rem;
    line-height:1.7;
    text-shadow:0 2px 0 rgba(0,0,0,.6), 0 0 18px rgba(0,0,0,.4);
    margin-bottom:28px;
  }

  .iloveyou-line{
    font-family:'Minecraft Seven', 'Helvetica Neue', Arial, sans-serif;
    font-size:2.4rem;
    text-shadow:0 3px 0 rgba(0,0,0,.6), 0 0 22px rgba(0,0,0,.45);
  }

  @media (max-width:480px){
    .iloveyou-quote{ font-size:1.05rem; }
    .iloveyou-line{ font-size:1.8rem; }
  }
</style>
</head>
<body>

  <audio id="bg-music" loop preload="auto"></audio>
  <div class="music-control toggle-only">
    <div class="music-row">
      <div class="music-meta">
        <img id="music-art" class="music-art" src="" alt="" hidden>
        <div id="music-art-fallback" class="music-art-fallback">♪</div>
        <div class="music-text">
          <span class="music-now-playing">Now Playing</span>
          <span id="music-title" class="music-title">warmth</span>
        </div>
      </div>
      <button id="music-toggle" class="music-toggle" aria-label="Pause music" aria-pressed="true">
        <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
    </div>
    <div class="music-volume-wrap">
      <div id="music-volume" class="music-volume" role="slider" tabindex="0"
           aria-label="Music volume" aria-orientation="vertical" aria-valuenow="25">
        <div class="music-volume-track"></div>
        <div id="music-volume-fill" class="music-volume-fill"></div>
        <div id="music-volume-thumb" class="music-volume-thumb"></div>
      </div>
    </div>
  </div>

  <main class="iloveyou-content">
    <p class="iloveyou-quote">"And the universe said I love you because you are love"</p>
    <p class="iloveyou-line">I love you.</p>
  </main>

<script src="music-player.js"></script>
</body>
</html>
