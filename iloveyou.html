<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I love you</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="music-player.css">
<style>
  /* Small page-specific tweaks — everything else reuses style.css's
     existing .card/.footer look so this page matches the rest of the site. */
  .iloveyou-card{ max-width:480px; }
  .iloveyou-title{
    font-size:2rem;
    font-weight:800;
    margin-bottom:14px;
  }
  .iloveyou-body{
    color:var(--gray-600);
    line-height:1.6;
    font-size:1rem;
  }
  .back-home{
    display:inline-block;
    margin-top:28px;
    color:var(--gray-600);
    text-decoration:none;
    font-size:.85rem;
    font-weight:600;
    transition:color .15s ease;
  }
  .back-home:hover{ color:var(--white); }
</style>
</head>
<body>

  <div class="bg-shapes" aria-hidden="true">
    <span class="shape circle"></span>
    <span class="shape ring"></span>
  </div>

  <canvas id="starfield" aria-hidden="true"></canvas>

  <audio id="bg-music" loop preload="auto"></audio>
  <div class="music-control">
    <div class="music-row">
      <div class="music-meta">
        <img id="music-art" class="music-art" src="" alt="" hidden>
        <div id="music-art-fallback" class="music-art-fallback">♪</div>
        <div class="music-text">
          <span class="music-now-playing">Now Playing</span>
          <span id="music-title" class="music-title">warmth</span>
        </div>
      </div>
      <button id="music-toggle" class="music-toggle" aria-label="Pause music" aria-pressed="true">
        <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
    </div>
    <div class="music-volume-wrap">
      <div id="music-volume" class="music-volume" role="slider" tabindex="0"
           aria-label="Music volume" aria-orientation="vertical" aria-valuenow="25">
        <div class="music-volume-track"></div>
        <div id="music-volume-fill" class="music-volume-fill"></div>
        <div id="music-volume-thumb" class="music-volume-thumb"></div>
      </div>
    </div>
  </div>

  <main class="card iloveyou-card">
    <h1 class="iloveyou-title">I love you</h1>
    <p class="iloveyou-body">
      This page is just a placeholder for now — tell me what you'd like it to say
      and look like, and I'll build it out.
    </p>
    <a class="back-home" href="index.html">&larr; Back home</a>
  </main>

<script src="starfield.js"></script>
<script src="music-player.js"></script>
</body>
</html>
